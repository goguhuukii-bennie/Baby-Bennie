<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.SHABU.HOUSE - Master Catalog</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #FFF0F6; --main: #F6A5C9; --dark: #E889B5; --white: #FFFFFF; --accent: #FF6B6B; }
        body { background: var(--bg); font-family: 'Mitr', sans-serif; margin: 0; padding: 0; color: #555; overflow-x: hidden; }
        
        /* Floating Stickers 🌷🧸🍮🐶 */
        #bg-stickers { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .sticker { position: absolute; bottom: -100px; font-size: 28px; opacity: 0.5; animation: floatUp 12s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }

        .shop-header { background: rgba(255, 255, 255, 0.85); text-align: center; padding: 20px; border-bottom: 3px solid var(--main); }
        .search-area { position: sticky; top: 0; z-index: 100; background: rgba(255, 240, 246, 0.95); padding: 15px; backdrop-filter: blur(10px); }
        .search-box { width: 100%; max-width: 500px; margin: 0 auto 10px; display: block; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--main); outline: none; box-sizing: border-box; }
        
        .tab-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--main); background: white; cursor: pointer; font-family: 'Mitr'; font-size: 13px; }
        .tab-btn.active { background: var(--main); color: white; }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--white); border-radius: 25px; border: 2px solid var(--main); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(246,165,201,0.2); }
        
        .img-container { width: 100%; aspect-ratio: 1/1; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }
        .card-content { padding: 15px; text-align: center; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 480px; border-radius: 30px; position: relative; animation: zoomIn 0.3s; overflow: hidden; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-body { padding: 20px; max-height: 85vh; overflow-y: auto; text-align: center; }
        .main-view { width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: contain; background: #fafafa; border: 1px solid #eee; margin-bottom: 15px; }
        
        .desc-box { text-align: left; font-size: 14px; background: #FFF9FB; padding: 15px; border-radius: 15px; border: 1px dashed var(--main); margin: 15px 0; line-height: 1.6; }
        
        /* สไตล์ส่วนลิงก์ตัวอย่างเฉพาะสินค้า "กลุ่ม" */
        .preview-section { background: #fdf2f7; padding: 12px; border-radius: 15px; margin-bottom: 15px; text-align: left; border: 1px solid #f6a5c9; }
        .preview-title { font-size: 12px; color: var(--dark); margin-bottom: 5px; font-weight: bold; }
        .copy-box { display: flex; gap: 5px; background: white; padding: 5px; border-radius: 10px; border: 1px solid #f6a5c9; }
        .copy-input { border: none; font-size: 11px; flex: 1; outline: none; color: #666; background: transparent; }
        .btn-copy { background: var(--main); color: white; border: none; padding: 5px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .btn-open { display: block; background: var(--dark); color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 10px; font-size: 13px; margin-top: 8px; font-weight: bold; }

        .btn-line { display: block; background: #06C755; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div id="bg-stickers"></div>
    <header class="shop-header"><h1>M.SHABU.HOUSE</h1></header>
    <div class="search-area">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ค้นหาสินค้า...">
        <div style="display:flex; justify-content:center; gap:10px;">
            <button onclick="filterData('all')" class="tab-btn active" id="btn-all">ทั้งหมด</button>
            <button onclick="filterData('กลุ่ม')" class="tab-btn" id="btn-group">กลุ่ม</button>
            <button onclick="filterData('ฟอนต์')" class="tab-btn" id="btn-font">ฟอนต์</button>
        </div>
    </div>
    <div class="catalog-grid" id="catalogDisplay"></div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; top:10px; right:20px; font-size:30px; cursor:pointer; z-index:10;">&times;</span>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const sheetGroup = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRshgMLFJ4id3I053uS9T-A_AYtNqDss27C4J6DBeU3ajtpZy-BxoCoOA6bpLEzfmlTtQ2tywho0zHf/pub?gid=0&single=true&output=csv';
        const sheetFont = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRshgMLFJ4id3I053uS9T-A_AYtNqDss27C4J6DBeU3ajtpZy-BxoCoOA6bpLEzfmlTtQ2tywho0zHf/pub?gid=853596946&single=true&output=csv';

        let dataStore = [];
        let currentFilter = 'all';

        async function init() {
            // ดึงข้อมูลแผ่นกลุ่ม (ปรับปรุงใหม่ตามลำดับ 7 คอลัมน์)
            Papa.parse(sheetGroup, {
                download: true,
                header: false,
                complete: function(results) {
                    const groupData = results.data.slice(1).map(c => {
                        if(!c[1]) return null;
                        return {
                            img: c[0], name: c[1], type: c[2], desc: c[3], preview: c[4], price: c[5], promo: c[6], cat: 'กลุ่ม'
                        };
                    }).filter(x => x !== null);
                    dataStore = [...dataStore, ...groupData];
                    render();
                }
            });

            // ดึงข้อมูลแผ่นฟอนต์ (คงเดิมทุกอย่าง 5 คอลัมน์ ไม่ยุ่งเลย)
            Papa.parse(sheetFont, {
                download: true,
                header: false,
                complete: function(results) {
                    const fontData = results.data.slice(1).map(c => {
                        if(!c[1]) return null;
                        return {
                            img: c[0], name: c[1], type: c[2], price: c[3], promo: c[4], desc: 'ฟอนต์ลายมือลิขสิทธิ์ M.SHABU.HOUSE', preview: '', cat: 'ฟอนต์'
                        };
                    }).filter(x => x !== null);
                    dataStore = [...dataStore, ...fontData];
                    render();
                }
            });
        }

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = dataStore.filter(i => 
                (i.name && i.name.toLowerCase().includes(search)) && 
                (currentFilter === 'all' || i.cat === currentFilter)
            );

            let html = '';
            filtered.forEach((item) => {
                const img = item.img ? item.img.split(',')[0].trim() : '';
                html += `
                <div class="card" onclick="openModal('${item.name}')">
                    <div class="img-container"><img src="${img}" onerror="this.src='https://via.placeholder.com/400/fff0f6/e889b5?text=No+Image'"></div>
                    <div class="card-content">
                        <div style="font-weight:500; color:var(--dark);">${item.name}</div>
                        <div style="color:var(--accent); font-weight:bold;">${item.price}฿</div>
                    </div>
                </div>`;
            });
            document.getElementById('catalogDisplay').innerHTML = html;
        }

        window.openModal = (name) => {
            const item = dataStore.find(i => i.name === name);
            const imgs = item.img.split(',').map(s => s.trim()).filter(u => u !== "");
            
            // ส่วนลิงก์ตัวอย่าง (จะโชว์เฉพาะถ้ามีข้อมูลในช่อง E ของแผ่นกลุ่ม)
            let previewHtml = '';
            if(item.preview && item.preview !== "" && item.preview !== "-") {
                previewHtml = `
                <div class="preview-section">
                    <div class="preview-title">🔗 ลิงก์ดูตัวอย่างไฟล์เต็ม</div>
                    <div class="copy-box">
                        <input type="text" value="${item.preview}" readonly id="linkPath" class="copy-input">
                        <button class="btn-copy" onclick="copyLink()">คัดลอก</button>
                    </div>
                    <a href="${item.preview}" target="_blank" class="btn-open">เปิดลิงก์ดูรูปตัวอย่าง</a>
                </div>`;
            }

            document.getElementById('modalBody').innerHTML = `
                <h2 style="color:var(--dark); margin-top:0; font-size:22px;">${item.name}</h2>
                <img src="${imgs[0]}" id="mainV" class="main-view">
                <div style="display:flex; gap:8px; justify-content:center; margin-bottom:15px; flex-wrap:wrap;">
                    ${imgs.map(u => `<img src="${u}" style="width:55px;height:55px;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid #eee" onclick="document.getElementById('mainV').src='${u}'">`).join('')}
                </div>
                ${item.promo && item.promo !== '-' ? `<div style="background:#fff4e5;color:#d35400;padding:12px;border-radius:15px;font-size:14px;margin-bottom:12px;font-weight:500;">🔥 ${item.promo}</div>` : ''}
                <div class="desc-box">${item.desc || 'ไม่มีรายละเอียดเพิ่มเติม'}</div>
                ${previewHtml}
                <div style="font-size:26px; color:var(--accent); font-weight:bold; margin-bottom:15px;">ราคา ${item.price} บาท</div>
                <a href="https://lin.ee/OdmIxYe" target="_blank" class="btn-line"><i class="fa-brands fa-line"></i> สนใจสั่งซื้อ คลิกทักไลน์</a>
            `;
            document.getElementById('itemModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        window.copyLink = () => {
            const copyText = document.getElementById("linkPath");
            copyText.select();
            document.execCommand("copy");
            alert("คัดลอกลิงก์สำเร็จแล้ว! 🎀");
        };

        window.closeModal = () => {
            document.getElementById('itemModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        window.filterData = (cat) => {
            currentFilter = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(cat === 'all') document.getElementById('btn-all').classList.add('active');
            if(cat === 'กลุ่ม') document.getElementById('btn-group').classList.add('active');
            if(cat === 'ฟอนต์') document.getElementById('btn-font').classList.add('active');
            render();
        };

        // Sticker System
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'sticker'; s.innerText = ['🌷', '🧸', '🍮', '🐶'][Math.floor(Math.random()*4)];
            s.style.left = Math.random()*100+'vw'; s.style.animationDuration = (Math.random()*5+10)+'s';
            document.getElementById('bg-stickers').appendChild(s);
            setTimeout(() => s.remove(), 12000);
        }, 1500);

        document.getElementById('searchInput').addEventListener('input', render);
        init();
    </script>
</body>
</html>
