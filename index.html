<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.SHABU.HOUSE - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #FFF0F6;
            --main: #F6A5C9;
            --dark: #E889B5;
            --white: #FFFFFF;
            --accent: #FF6B6B;
            --purple: #E2D1F9;
        }
        
        body {
            background: var(--bg);
            font-family: 'Mitr', sans-serif;
            margin: 0; padding: 0; color: #555;
            overflow-x: hidden;
        }

        /* --- BG Stickers ลอยหลัง --- */
        .bg-stickers {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .sticker {
            position: absolute; bottom: -100px; font-size: 24px; opacity: 0.5;
            animation: floatUp 15s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* --- Header & Logo --- */
        .shop-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 30px 15px;
            border-bottom: 3px solid var(--main);
        }
        .shop-logo {
            width: 120px; /* ขนาดโลโก้ */
            height: auto;
            margin-bottom: 10px;
            border-radius: 20px;
        }
        .shop-header h1 { color: var(--dark); margin: 0; font-size: 28px; letter-spacing: 1px; }
        .shop-header p { margin: 5px 0 0; font-size: 13px; color: var(--main); }

        /* --- Search Area (Sticky) --- */
        .search-area {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 240, 246, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            box-shadow: 0 4px 10px rgba(246,165,201,0.1);
        }
        .search-box {
            width: 100%; max-width: 500px; margin: 0 auto 12px; display: block;
            padding: 12px 20px; border-radius: 25px; border: 2px solid var(--main);
            outline: none; font-family: 'Mitr'; box-sizing: border-box;
        }
        .filter-tabs { display: flex; justify-content: center; gap: 8px; }
        .tab-btn {
            padding: 6px 18px; border-radius: 20px; border: 1px solid var(--main);
            background: white; color: var(--dark); font-family: 'Mitr'; font-size: 13px; cursor: pointer;
        }
        .tab-btn.active { background: var(--main); color: white; }

        /* --- Catalog Grid --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; padding: 20px; max-width: 1100px; margin: 0 auto;
        }
        .card {
            background: var(--white); border-radius: 25px; border: 2px solid var(--main);
            overflow: hidden; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .promo-pin {
            position: absolute; top: 12px; left: 12px; background: var(--accent);
            color: white; padding: 4px 14px; border-radius: 20px; font-size: 11px; z-index: 10;
        }
        .img-slider {
            width: 100%; aspect-ratio: 1/1; display: flex;
            overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .img-slider::-webkit-scrollbar { display: none; }
        .img-slider img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: contain; }

        .swipe-hint { font-size: 10px; text-align: center; background: #fff5f8; padding: 5px; color: var(--dark); border-bottom: 1px solid #ffeef5; }
        .card-content { padding: 15px; }
        .type-tag { display: inline-block; font-size: 10px; background: var(--purple); color: #7d6caf; padding: 2px 10px; border-radius: 10px; margin-bottom: 8px; }
        .card-title { font-size: 17px; color: var(--dark); font-weight: 500; }
        .card-desc { font-size: 13px; color: #777; line-height: 1.5; white-space: pre-wrap; }
        .card-desc a { color: var(--main); font-weight: 500; text-decoration: underline; }

        /* --- Footer --- */
        .footer {
            background: var(--white); padding: 40px 20px; text-align: center;
            border-top: 2px solid var(--main); margin-top: 50px;
        }
        .contact-hq { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .contact-hq a { color: var(--main); font-size: 28px; text-decoration: none; transition: 0.3s; }
        .contact-hq a:hover { transform: scale(1.2); color: var(--dark); }
    </style>
</head>
<body>

    <div class="bg-stickers" id="stickerContainer"></div>

    <header class="shop-header">
        <img src="logo.png" alt="M.SHABU.HOUSE Logo" class="shop-logo" onerror="this.style.display='none'">
        <h1>M.SHABU.HOUSE</h1>
        <p>🎀 ศูนย์รวมความน่ารัก กลุ่มของตกแต่ง & ฟอนต์ 🎀</p>
    </header>

    <div class="search-area">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ค้นหาชื่อกลุ่ม หรือฟอนต์...">
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterData('all', this)">ทั้งหมด</button>
            <button class="tab-btn" onclick="filterData('กลุ่ม', this)">กลุ่ม</button>
            <button class="tab-btn" onclick="filterData('ฟอนต์', this)">ฟอนต์</button>
        </div>
    </div>

    <div class="catalog-grid" id="catalogDisplay">
        </div>

    <footer class="footer">
        <div style="color:var(--dark); font-weight:500;">✨ ติดต่อเจ้าของเครือ (HQ) ✨</div>
        <div class="contact-hq">
            <a href="https://lin.ee/OdmIxYe" target="_blank" title="Line"><i class="fa-brands fa-line"></i></a>
            <a href="#" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
        </div>
        <p style="font-size: 10px; color: #bbb; margin-top: 25px;">© M.SHABU.HOUSE ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        // --- ระบบสติ๊กเกอร์ลอยหลัง ---
        const icons = ['🌷', '🐶', '🍮', '🧸'];
        const container = document.getElementById('stickerContainer');
        function createSticker() {
            const sticker = document.createElement('div');
            sticker.className = 'sticker';
            sticker.innerText = icons[Math.floor(Math.random() * icons.length)];
            sticker.style.left = Math.random() * 100 + 'vw';
            sticker.style.fontSize = (Math.random() * 20 + 20) + 'px';
            sticker.style.animationDuration = (Math.random() * 10 + 10) + 's';
            container.appendChild(sticker);
            setTimeout(() => sticker.remove(), 15000);
        }
        setInterval(createSticker, 1500);

        // --- ลิงก์ URL เดิมของคุณ (ถูกต้องแล้ว) ---
        const sheetGroupURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRshgMLFJ4id3I053uS9T-A_AYtNqDss27C4J6DBeU3ajtpZy-BxoCoOA6bpLEzfmlTtQ2tywho0zHf/pub?gid=0&single=true&output=csv';
        const sheetFontURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRshgMLFJ4id3I053uS9T-A_AYtNqDss27C4J6DBeU3ajtpZy-BxoCoOA6bpLEzfmlTtQ2tywho0zHf/pub?gid=853596946&single=true&output=csv';

        let dataStore = [];
        let currentType = 'all';

        async function init() {
            try {
                const [res1, res2] = await Promise.all([fetch(sheetGroupURL), fetch(sheetFontURL)]);
                const t1 = await res1.text();
                const t2 = await res2.text();
                dataStore = [...parseCSV(t1, 'กลุ่ม'), ...parseCSV(t2, 'ฟอนต์')];
                render();
            } catch (e) { 
                document.getElementById('catalogDisplay').innerHTML = '❌ โหลดข้อมูลไม่สำเร็จ กรุณาตรวจสอบการ Publish CSV';
            }
        }

        function parseCSV(text, type) {
            return text.split(/\r?\n/).slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 3 || !cols[1]) return null;
                return {
                    img: cols[0].replace(/"/g, '').trim(),
                    name: cols[1].replace(/"/g, '').trim(),
                    desc: cols[2].replace(/"/g, '').trim(),
                    promo: cols[3] ? cols[3].replace(/"/g, '').trim() : '',
                    type: type
                };
            }).filter(i => i !== null);
        }

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = dataStore.filter(i => {
                return i.name.toLowerCase().includes(search) && (currentType === 'all' || i.type === currentType);
            });

            let html = '';
            filtered.forEach(item => {
                const imgs = item.img.split(',');
                let imgHtml = imgs.map(u => `<img src="${u.trim()}" onerror="this.src='https://via.placeholder.com/300/fff0f6/e889b5?text=M.SHABU'">`).join('');
                const descWithLinks = item.desc.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">คลิกดูเพิ่มเติม</a>');

                html += `
                    <div class="card">
                        ${item.promo ? `<div class="promo-pin">${item.promo}</div>` : ''}
                        <div class="img-slider">${imgHtml}</div>
                        ${imgs.length > 1 ? '<div class="swipe-hint">↔ ปัดเพื่อดูรูปเพิ่มเติม</div>' : ''}
                        <div class="card-content">
                            <span class="type-tag">${item.type}</span>
                            <div class="card-title">${item.name}</div>
                            <div class="card-desc">${descWithLinks}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('catalogDisplay').innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:50px;">ไม่พบรายการที่ค้นหา 🎀</div>';
        }

        function filterData(type, btn) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        document.getElementById('searchInput').addEventListener('input', render);
        init();
    </script>
</body>
</html>
