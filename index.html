<script>
    // ตรวจสอบลิงก์ CSV ให้แน่ใจว่าเลือก "กลุ่มอื่นๆ" และเป็น ".csv" นะครับ
    const sheetFont = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRshgMLFJ4id3I053uS9T-A_AYtNqDss27C4J6DBeU3ajtpZy-BxoCoOA6bpLEzfmlTtQ2tywho0zHf/pub?gid=853596946&single=true&output=csv';
    const sheetGroup = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRshgMLFJ4id3I053uS9T-A_AYtNqDss27C4J6DBeU3ajtpZy-BxoCoOA6bpLEzfmlTtQ2tywho0zHf/pub?gid=0&single=true&output=csv';
    const sheetOther = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRshgMLFJ4id3I053uS9T-A_AYtNqDss27C4J6DBeU3ajtpZy-BxoCoOA6bpLEzfmlTtQ2tywho0zHf/pub?gid=1945384279&single=true&output=csv';

    let dataStore = [];
    let currentFilter = 'all';

    // ฟังก์ชันทำความสะอาดข้อมูล (ล้างช่องว่าง/ตัวอักษรขยะ)
    const clean = (v) => v ? v.toString().trim().replace(/^"|"$/g, '') : "";

    function loadSheet(url, cat) {
        return new Promise((resolve) => {
            Papa.parse(url, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    const checkP = (v) => (v && v.trim() !== "" && v.trim() !== "-") ? v.trim() : null;
                    const parsedData = results.data.slice(1).map(c => {
                        if (!clean(c[1])) return null; // ถ้าไม่มีชื่อสินค้าให้ข้าม

                        if (cat === 'ฟอนต์') {
                            return { 
                                img: clean(c[0]), name: clean(c[1]), type: clean(c[2]), 
                                price: clean(c[3]), promo: checkP(clean(c[4])), 
                                desc: 'ฟอนต์ลายมือลิขสิทธิ์ M.SHABU.HOUSE', preview: '', cat: 'ฟอนต์' 
                            };
                        } else {
                            return { 
                                img: clean(c[0]), name: clean(c[1]), type: clean(c[2]), 
                                desc: clean(c[3]), preview: clean(c[4]), 
                                price: clean(c[5]), promo: checkP(clean(c[6])), cat: cat 
                            };
                        }
                    }).filter(x => x !== null);
                    resolve(parsedData);
                },
                error: function() { resolve([]); } // ถ้าโหลดแผ่นนั้นไม่ได้ ให้ส่งค่าว่างกลับไปก่อนไม่ให้ระบบพัง
            });
        });
    }

    async function init() {
        console.log("เริ่มโหลดข้อมูลทั้ง 3 ส่วน...");
        // บังคับให้โหลดเสร็จทุกลิงก์ก่อนเริ่ม Render
        const results = await Promise.all([
            loadSheet(sheetFont, 'ฟอนต์'),
            loadSheet(sheetGroup, 'กลุ่ม'),
            loadSheet(sheetOther, 'กลุ่มอื่นๆ')
        ]);

        dataStore = results.flat(); // รวมข้อมูล 3 แผ่นเข้าด้วยกัน
        console.log("โหลดสำเร็จทั้งหมด:", dataStore.length, "รายการ");
        render();
    }

    function render() {
        const searchInput = document.getElementById('searchInput');
        const search = searchInput ? searchInput.value.toLowerCase() : "";
        
        const filtered = dataStore.filter(i => 
            (i.name && i.name.toLowerCase().includes(search)) && 
            (currentFilter === 'all' || i.cat === currentFilter)
        );

        let html = '';
        filtered.forEach((item) => {
            // ระบบจัดการรูปภาพ (เอาเฉพาะ URL แรกและล้างขยะออก)
            let imgUrl = item.img.split(',')[0].trim();
            if(!imgUrl.startsWith('http')) {
                // ถ้าลิงก์รวน ให้พยายามหาว่ามี https ซ่อนอยู่ข้างในไหม (แก้ปัญหารูป 18)
                const match = imgUrl.match(/https?:\/\/[^\s]+/);
                imgUrl = match ? match[0] : 'https://via.placeholder.com/400/fff0f6/e889b5?text=No+Image';
            }

            html += `
            <div class="card" onclick="openModal('${item.name.replace(/'/g, "\\'")}')">
                ${item.promo ? `<div class="promo-tag">🔥 PROMO</div>` : ''}
                <div class="img-container">
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/400/fff0f6/e889b5?text=Error+Link'">
                </div>
                <div class="card-content">
                    <div style="font-weight:500; color:var(--dark);">${item.name}</div>
                    <div style="color:var(--accent); font-weight:bold;">${item.price}฿</div>
                </div>
            </div>`;
        });
        
        document.getElementById('catalogDisplay').innerHTML = html || '<p style="grid-column:1/-1; text-align:center; padding:50px;">ยังไม่มีสินค้าในหมวดนี้ 🎀</p>';
    }

    // ฟังก์ชันอื่นๆ (openModal, copyURL, filterData) ให้คงเดิมตามโค้ดล่าสุด
    // ... (ก๊อปปี้ส่วนที่เหลือจากเวอร์ชันก่อนหน้ามาใส่ได้เลยครับ) ...
</script>
